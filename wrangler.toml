name = "bibleapp-api"
main = "src/index.ts"
compatibility_date = "2026-03-30"

# If you use node packages like "openai", keep this:
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = true

[[r2_buckets]]
binding = "AUDIO_BUCKET"
bucket_name = "shepherd-audio"
